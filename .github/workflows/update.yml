name: Update Apple HIG

# Refreshes the HIG every month on the 13th, and can be run manually at any
# time from the Actions tab ("Run workflow"). A monthly cadence also keeps the
# scheduled workflow from being auto-disabled and catches Apple's interim edits.
on:
  schedule:
    - cron: "0 8 13 * *" # 08:00 UTC, the 13th of every month
  workflow_dispatch:

permissions:
  contents: write # allow the job to commit regenerated files

concurrency:
  group: update-hig
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Regenerate HIG Markdown
        run: python3 hig_download.py --out . --readme --images remote --workers 12

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Apple HIG ($(date -u +%Y-%m-%d))"
            git push
          fi
